
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magiczne Litery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; overflow: hidden; cursor: crosshair; }
        .letter { position: absolute; font-size: 3rem; font-weight: bold; pointer-events: none; user-select: none; animation: fadeOut 2s forwards; }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-50px); } }
    </style>
</head>
<body class="w-screen h-screen" onclick="createLetter(event)">

    <div class="fixed top-4 left-4 z-50 flex flex-col gap-2">
        <h1 class="text-6xl font-bold text-indigo-400 opacity-80">LITERY</h1>
        <button id="auto-btn" onclick="toggleAuto(event)" class="bg-indigo-600 text-white px-4 py-2 rounded shadow">Tryb: Ręczny</button>
        <select id="lang-select" onchange="updateAlphabet()" class="bg-indigo-800 text-white p-2 rounded">
            <option value="pl">Polski</option>
            <option value="en">Angielski</option>
            <option value="it">Włoski</option>
            <option value="de">Niemiecki</option>
            <option value="uk">Ukraiński</option>
        </select>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let isAuto = false;
        let autoInterval;
        let alphabet = "AĄBCĆDEĘFGHIJKLŁMNŃOÓPQRSŚTUVWXYZŹŻ";

        function updateAlphabet() {
            const lang = document.getElementById('lang-select').value;
            if (lang === 'pl') alphabet = "AĄBCĆDEĘFGHIJKLŁMNŃOÓPQRSŚTUVWXYZŹŻ";
            else if (lang === 'en') alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            else if (lang === 'it') alphabet = "ABCDEFGHILMNOPQRSTUVZ";
            else if (lang === 'de') alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZÄÖÜẞ";
            else if (lang === 'uk') alphabet = "АБВГҐДЕЄЖЗИІЇЙКЛМНОПРСТУФХЦЧШЩЮЯ";
        }

        function toggleAuto(e) {
            e.stopPropagation();
            isAuto = !isAuto;
            document.getElementById('auto-btn').innerText = isAuto ? "Tryb: Automagiczny" : "Tryb: Ręczny";
            if (isAuto) {
                autoInterval = setInterval(() => {
                    createLetter({ clientX: Math.random() * window.innerWidth, clientY: Math.random() * window.innerHeight }, true);
                }, 300);
            } else {
                clearInterval(autoInterval);
            }
        }

        function playMagicSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400 + Math.random() * 400, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function createLetter(e, silent = false) {
            if (!silent) playMagicSound();
            
            const char = alphabet[Math.floor(Math.random() * alphabet.length)];
            const colors = ['#f87171', '#fbbf24', '#34d399', '#60a5fa', '#a78bfa', '#f472b6'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            const div = document.createElement('div');
            div.className = 'letter';
            div.innerText = char;
            div.style.left = e.clientX + 'px';
            div.style.top = e.clientY + 'px';
            div.style.color = color;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2000);
        }
    </script>
</body>
</html>
